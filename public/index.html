<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Excel Demo</title>
  <!-- Luckysheet CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/css/pluginsCss.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/plugins.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/css/luckysheet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/assets/iconfont/iconfont.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .status { font-size: 13px; opacity: 0.9; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .status-dot.connected { background: #4caf50; }
    .status-dot.disconnected { background: #f44336; }

    /* Main Layout */
    .main { flex: 1; display: flex; overflow: hidden; }

    /* Excel Area */
    .excel-area { flex: 1; position: relative; }
    #luckysheet { position: absolute; width: 100%; height: 100%; }

    /* Chat Panel */
    .chat-panel {
      width: 380px; background: white;
      display: flex; flex-direction: column;
      border-left: 1px solid #e0e0e0;
      box-shadow: -2px 0 8px rgba(0,0,0,0.05);
    }
    .chat-header {
      padding: 14px 18px; border-bottom: 1px solid #eee;
      font-weight: 600; font-size: 15px; color: #333;
    }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .message {
      max-width: 90%; padding: 10px 14px;
      border-radius: 12px; font-size: 14px; line-height: 1.5;
      word-wrap: break-word;
    }
    .message.user {
      align-self: flex-end; background: #667eea; color: white;
      border-bottom-right-radius: 4px;
    }
    .message.agent {
      align-self: flex-start; background: #f0f0f0; color: #333;
      border-bottom-left-radius: 4px;
    }
    .message.system {
      align-self: center; background: transparent; color: #999;
      font-size: 12px; padding: 4px;
    }
    .message pre {
      background: rgba(0,0,0,0.06); padding: 8px; border-radius: 6px;
      font-size: 12px; overflow-x: auto; margin: 6px 0;
    }
    .status-msg {
      align-self: center; color: #999; font-size: 12px;
      padding: 4px 8px;
    }
    .status-msg::before {
      content: ''; display: inline-block; width: 12px; height: 12px;
      border: 2px solid #999; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-right: 6px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Chat Input */
    .chat-input-area {
      padding: 12px; border-top: 1px solid #eee;
      display: flex; gap: 8px;
    }
    .chat-input-area input {
      flex: 1; padding: 10px 14px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .chat-input-area input:focus { border-color: #667eea; }
    .chat-input-area button {
      padding: 10px 20px; background: #667eea; color: white;
      border: none; border-radius: 8px; font-size: 14px;
      cursor: pointer; transition: background 0.2s;
    }
    .chat-input-area button:hover { background: #5a6fd6; }
    .chat-input-area button:disabled { background: #ccc; cursor: not-allowed; }

    /* Demo hints */
    .hints {
      padding: 10px 16px; background: #fafafa; border-top: 1px solid #eee;
      font-size: 12px; color: #888;
    }
    .hints span { color: #667eea; cursor: pointer; }
    .hints span:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>🤖 Agent Excel Demo</h1>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">连接中...</span>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Excel -->
    <div class="excel-area">
      <div id="luckysheet"></div>
    </div>

    <!-- Chat -->
    <div class="chat-panel">
      <div class="chat-header">💬 Excel 助手</div>
      <div class="chat-messages" id="chatMessages">
        <div class="message system">连接到 Agent 中...</div>
      </div>
      <div class="hints">
        试试: <span onclick="fillExample(this)">帮我填一些示例数据</span> ·
        <span onclick="quickCmd(this)">B列求和放到C1</span> ·
        <span onclick="quickCmd(this)">把标题行加粗标黄</span>
      </div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="用自然语言描述你要做的操作..."
               onkeydown="if(event.key==='Enter') sendMessage()" />
        <button id="sendBtn" onclick="sendMessage()">发送</button>
      </div>
    </div>
  </div>

  <!-- Luckysheet JS -->
  <script src="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/js/plugin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/luckysheet.umd.js"></script>

  <script>
    // ==========================================
    // 全局状态
    // ==========================================
    let ws = null;
    let sessionId = 'demo-' + Date.now();
    let isConnected = false;

    // ==========================================
    // Luckysheet 初始化
    // ==========================================
    function initLuckysheet() {
      luckysheet.create({
        container: 'luckysheet',
        title: 'Agent Excel Demo',
        lang: 'zh',
        showinfobar: false,
        showsheetbar: true,
        showstatisticBar: true,
        data: [{
          name: 'Sheet1',
          color: '',
          status: 1,
          order: 0,
          celldata: [
            // 预填一些示例数据让表格不那么空
            { r: 0, c: 0, v: { v: '姓名', ct: { fa: 'General', t: 'g' }, fc: '#333', bl: 1 } },
            { r: 0, c: 1, v: { v: '销售额', ct: { fa: 'General', t: 'g' }, fc: '#333', bl: 1 } },
            { r: 0, c: 2, v: { v: '备注', ct: { fa: 'General', t: 'g' }, fc: '#333', bl: 1 } },
          ],
          config: {
            columnlen: { 0: 120, 1: 120, 2: 150 },
          },
        }],
        hook: {
          // 可以在这里 hook Excel 事件
        },
      });
    }

    // ==========================================
    // WebSocket 连接
    // ==========================================
    function connectWS() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}`);

      ws.onopen = () => {
        console.log('WebSocket 已连接');
        ws.send(JSON.stringify({ type: 'register', sessionId }));
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleMessage(msg);
      };

      ws.onclose = () => {
        console.log('WebSocket 已断开');
        setConnected(false);
        // 3秒后重连
        setTimeout(connectWS, 3000);
      };

      ws.onerror = (err) => {
        console.error('WebSocket 错误', err);
      };
    }

    function setConnected(connected) {
      isConnected = connected;
      document.getElementById('statusDot').className = 'status-dot ' + (connected ? 'connected' : 'disconnected');
      document.getElementById('statusText').textContent = connected ? 'Agent 已连接' : '未连接';
    }

    // ==========================================
    // 消息处理
    // ==========================================
    function handleMessage(msg) {
      switch (msg.type) {
        case 'registered':
          setConnected(true);
          addSystemMessage('✅ 已连接到 Agent，可以开始对话了！');
          break;

        case 'status':
          addStatusMessage(msg.message);
          break;

        case 'chat_reply':
          removeStatusMessage();
          addAgentMessage(msg.content);
          document.getElementById('sendBtn').disabled = false;
          break;

        case 'tool_call':
          // Server 发来的工具调用请求，在浏览器端执行
          executeTool(msg.id, msg.method, msg.params);
          break;
      }
    }

    // ==========================================
    // Tool Runtime - 浏览器端执行 Excel 操作
    // ==========================================
    function executeTool(requestId, method, params) {
      try {
        let result;

        switch (method) {
          case 'get_cell_value': {
            const { row, col } = params;
            // Luckysheet API: 行列从 0 开始
            const val = luckysheet.getCellValue(row - 1, colToIndex(col));
            result = val !== null && val !== undefined ? String(val) : '';
            break;
          }

          case 'set_cell_value': {
            const { row, col, value } = params;
            const r = row - 1;
            const c = colToIndex(col);
            // Luckysheet setCellValue 直接支持公式字符串（以 = 开头）
            luckysheet.setCellValue(r, c, value);
            result = { ok: true, cell: `${col}${row}`, value };
            break;
          }

          case 'get_range_values': {
            const { startRow, startCol, endRow, endCol } = params;
            const data = [];
            for (let r = startRow - 1; r < endRow; r++) {
              const row = [];
              for (let c = colToIndex(startCol); c <= colToIndex(endCol); c++) {
                const val = luckysheet.getCellValue(r, c);
                row.push(val !== null && val !== undefined ? val : null);
              }
              data.push(row);
            }
            result = data;
            break;
          }

          case 'set_range_values': {
            const { startRow, startCol, values } = params;
            for (let r = 0; r < values.length; r++) {
              for (let c = 0; c < values[r].length; c++) {
                luckysheet.setCellValue(startRow - 1 + r, colToIndex(startCol) + c, values[r][c]);
              }
            }
            result = { ok: true, range: `${startCol}${startRow}:${startCol}${startRow + values.length - 1}` };
            break;
          }

          case 'get_sheet_info': {
            const sheetData = luckysheet.getSheetData();
            const rows = sheetData ? sheetData.length : 84;
            const cols = sheetData && sheetData[0] ? sheetData[0].length : 60;
            result = { rows, cols, name: 'Sheet1' };
            break;
          }

          case 'apply_cell_style': {
            const { row, col, bold, bgColor, fontColor, fontSize } = params;
            const r = row - 1;
            const c = colToIndex(col);
            // 使用 Luckysheet 的 setRangeFormat
            try {
              if (bold) luckysheet.setRangeFormat('bl', 1, { row: [r, r], column: [c, c] });
              if (bgColor) luckysheet.setRangeFormat('bg', bgColor, { row: [r, r], column: [c, c] });
              if (fontColor) luckysheet.setRangeFormat('fc', fontColor, { row: [r, r], column: [c, c] });
              if (fontSize) luckysheet.setRangeFormat('fs', fontSize, { row: [r, r], column: [c, c] });
            } catch(e) {
              // fallback: 忽略样式错误，不影响数据操作
              console.warn('setRangeFormat failed:', e);
            }
            result = { ok: true };
            break;
          }

          case 'insert_formula': {
            const { row, col, formula } = params;
            const r = row - 1;
            const c = colToIndex(col);
            // Luckysheet setCellValue 直接支持公式字符串
            luckysheet.setCellValue(r, c, formula);
            result = { ok: true, cell: `${col}${row}`, formula };
            break;
          }

          default:
            throw new Error(`未知工具: ${method}`);
        }

        // 返回结果给 Server
        ws.send(JSON.stringify({ type: 'tool_result', id: requestId, result }));
      } catch (err) {
        ws.send(JSON.stringify({ type: 'tool_result', id: requestId, error: err.message }));
      }
    }

    // 列字母转数字索引 (A=0, B=1, ...)
    function colToIndex(col) {
      let index = 0;
      for (let i = 0; i < col.length; i++) {
        index = index * 26 + (col.charCodeAt(i) - 65);
      }
      return index;
    }

    // ==========================================
    // Chat UI
    // ==========================================
    function addUserMessage(text) {
      const div = document.createElement('div');
      div.className = 'message user';
      div.textContent = text;
      document.getElementById('chatMessages').appendChild(div);
      scrollChat();
    }

    function addAgentMessage(text) {
      const div = document.createElement('div');
      div.className = 'message agent';
      // 简单 markdown: code blocks
      div.innerHTML = text
        .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
      document.getElementById('chatMessages').appendChild(div);
      scrollChat();
    }

    function addSystemMessage(text) {
      const div = document.createElement('div');
      div.className = 'message system';
      div.textContent = text;
      document.getElementById('chatMessages').appendChild(div);
      scrollChat();
    }

    function addStatusMessage(text) {
      removeStatusMessage();
      const div = document.createElement('div');
      div.className = 'status-msg';
      div.id = 'currentStatus';
      div.textContent = text;
      document.getElementById('chatMessages').appendChild(div);
      scrollChat();
    }

    function removeStatusMessage() {
      const el = document.getElementById('currentStatus');
      if (el) el.remove();
    }

    function scrollChat() {
      const container = document.getElementById('chatMessages');
      container.scrollTop = container.scrollHeight;
    }

    // ==========================================
    // 发送消息
    // ==========================================
    function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || !isConnected) return;

      addUserMessage(text);
      input.value = '';
      document.getElementById('sendBtn').disabled = true;

      ws.send(JSON.stringify({ type: 'chat', content: text }));
    }

    function quickCmd(el) {
      document.getElementById('chatInput').value = el.textContent;
      sendMessage();
    }

    function fillExample(el) {
      document.getElementById('chatInput').value = '帮我填入以下数据：A2到A5填入张三、李四、王五、赵六，B2到B5填入1500、2300、1800、3200';
      sendMessage();
    }

    // ==========================================
    // 初始化
    // ==========================================
    window.onload = () => {
      initLuckysheet();
      connectWS();
    };
  </script>
</body>
</html>
